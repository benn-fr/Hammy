services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hammy
      POSTGRES_USER: hammy_admin
      POSTGRES_PASSWORD: local-hammy-admin-password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - hammy-postgres:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/001-hammy-app.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hammy_admin -d hammy"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgres://hammy_app:local-hammy-app-password@postgres:5432/hammy
      JWT_SECRET: local-compose-secret-change-before-deploying
      CORS_ORIGINS: ""
    ports:
      - "127.0.0.1:8787:8787"

volumes:
  hammy-postgres:
