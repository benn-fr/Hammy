name: Build Hammy Companion

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag for the GitHub Release, for example v0.1.0"
        required: true
        type: string
  push:
    paths:
      - "Companion/**"
      - ".github/workflows/companion-desktop.yml"

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run dist:mac
            artifact: Companion/release/mac*/Hammy Companion.app
            name: hammy-companion-macos-app
          - os: windows-latest
            command: npm run dist:win
            artifact: Companion/release/*.exe
            name: hammy-companion-windows-exe
          - os: ubuntu-latest
            command: npm run dist:linux
            artifact: Companion/release/*.AppImage
            name: hammy-companion-linux-appimage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Companion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: Companion/package-lock.json }
      - run: npm ci
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  ios-ipa:
    name: Build Hammy IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build unsigned device archive
        run: |
          xcodebuild archive \
            -project Hammy.xcodeproj \
            -scheme Hammy \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Hammy.xcarchive" \
            CODE_SIGNING_ALLOWED=NO
          ./Scripts/create-ipa.sh \
            "$RUNNER_TEMP/Hammy.xcarchive/Products/Applications/Hammy.app" \
            "$RUNNER_TEMP/Hammy-unsigned.ipa"
      - uses: actions/upload-artifact@v4
        with:
          name: hammy-ios-unsigned-ipa
          path: ${{ runner.temp }}/Hammy-unsigned.ipa

  release:
    name: Publish GitHub Release
    needs: [package, ios-ipa]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Package the macOS app bundle
        shell: bash
        run: |
          set -euo pipefail
          app_bundle="$(find release-assets -type d -name 'Hammy Companion.app' -print -quit)"
          test -n "$app_bundle"
          (
            cd "$(dirname "$app_bundle")"
            zip -qry "$GITHUB_WORKSPACE/release-assets/Hammy-Companion-macos.zip" "$(basename "$app_bundle")"
          )
          cp "$(find release-assets -type f -name '*.exe' -print -quit)" release-assets/Hammy-Companion-windows.exe
          cp "$(find release-assets -type f -name '*.AppImage' -print -quit)" release-assets/Hammy-Companion-linux.AppImage
          cp "$(find release-assets -type f -name 'Hammy-unsigned.ipa' -print -quit)" release-assets/Hammy-unsigned.ipa

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            release-assets/Hammy-Companion-macos.zip
            release-assets/Hammy-Companion-windows.exe
            release-assets/Hammy-Companion-linux.AppImage
            release-assets/Hammy-unsigned.ipa
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "Hammy $RELEASE_TAG" \
              --generate-notes \
              --notes "Hammy Companion builds for macOS, Windows, and Linux, plus an unsigned iOS device IPA. The IPA must be signed with your own Apple Developer certificate before it can be installed on an iPhone."
          fi
