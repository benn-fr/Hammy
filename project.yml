name: Hammy

options:
  bundleIdPrefix: com.ben
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES

targets:
  Hammy:
    type: application
    platform: iOS
    sources:
      - path: Hammy
      - path: Shared
    info:
      path: Hammy/Info.plist
      properties:
        CFBundleDisplayName: Hammy
        LSRequiresIPhoneOS: true
        NSPhotoLibraryUsageDescription: Hammy uses photos you choose as context for your prompts.
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: com.ben.Hammy
            CFBundleURLSchemes:
              - hammy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ben.Hammy
        PRODUCT_NAME: Hammy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: HammyWidget
        embed: true

  HammyWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HammyWidget
      - path: Shared
    info:
      path: HammyWidget/Info.plist
      properties:
        CFBundleDisplayName: Hammy Live
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ben.Hammy.Widget
        PRODUCT_NAME: HammyWidget
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  HammyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HammyTests
    dependencies:
      - target: Hammy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ben.HammyTests
        GENERATE_INFOPLIST_FILE: YES

  HammyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HammyUITests
    dependencies:
      - target: Hammy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ben.HammyUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Hammy:
    build:
      targets:
        Hammy: all
        HammyWidget: all
        HammyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: HammyTests
        - name: HammyUITests
    archive:
      config: Release
